name: CD Deployment

on:
  push:
    branches:
      - main

permissions:
  id-token: write  
  contents: read

env:
  AWS_REGION: "us-east-1"
  ECR_REPOSITORY: "doc-helper-ai-agent"
  ECS_CLUSTER: "doc-helper-cluster"
  ECS_SERVICE: "doc-helper-ai-task-service-ao2opdat"

jobs:
  ci-quality:
    name: Lint, Test, and Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.28"
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Check formatting and Lint
        run: |
          uv run ruff format --check .
          uv run ruff check .

      - name: Run tests
        env:
          ENABLE_MOCK_LLM: "true"
          LLM_PROVIDER: "mock"
        run: uv run pytest

  deploy:
    name: Build and Deploy to ECS
    needs: ci-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::964866958896:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push immutable image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          # Build and push strictly using the unique Git SHA tag
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

          # Pass this URI downstream to the next GitHub Action steps
          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Render ECS task definition
        id: task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/ecs-task-definition.json
          container-name: doc-helper-container
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-definition.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.ECS_SERVICE }}
          wait-for-service-stability: true

      - name: Run deployment health check with Retries
        run: |
          echo "Starting health check verification loop..."
          
          for attempt in {1..20}; do
            echo "Attempt $attempt/20: Finding active task for service..."
            
            # 1. Grab all tasks for the service
            TASK_ARNS=$(aws ecs list-tasks \
              --cluster "${{ env.ECS_CLUSTER }}" \
              --service-name "${{ env.ECS_SERVICE }}" \
              --query 'taskArns' \
              --output text)
            
            if [ -z "$TASK_ARNS" ] || [ "$TASK_ARNS" == "None" ]; then
              echo "No tasks found yet. Waiting 5 seconds..."
              sleep 5
              continue
            fi
            
            # 2. Safely isolate the most recently created task ARN
            TASK_ARN=$(aws ecs describe-tasks \
              --cluster "${{ env.ECS_CLUSTER }}" \
              --tasks $TASK_ARNS \
              --query 'reverse(sort_by(tasks, &createdAt))[0].taskArn' \
              --output text)
              
            if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" == "None" ]; then
              echo "Task details not available yet. Waiting 5 seconds..."
              sleep 5
              continue
            fi
            
            # 3. Get the Elastic Network Interface (ENI) ID
            ENI_ID=$(aws ecs describe-tasks \
              --cluster "${{ env.ECS_CLUSTER }}" \
              --tasks "$TASK_ARN" \
              --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value | [0]' \
              --output text)
              
            if [ -z "$ENI_ID" ] || [ "$ENI_ID" == "None" ]; then
              echo "ENI not attached yet. Waiting 5 seconds..."
              sleep 5
              continue
            fi
            
            # 4. Query EC2 for the new Public IP
            PUBLIC_IP=$(aws ec2 describe-network-interfaces \
              --network-interface-ids "$ENI_ID" \
              --query 'NetworkInterfaces[0].Association.PublicIp' \
              --output text)
              
            if [ -z "$PUBLIC_IP" ] || [ "$PUBLIC_IP" == "None" ]; then
              echo "Public IP not assigned yet. Waiting 5 seconds..."
              sleep 5
              continue
            fi

            echo "Service URL resolved to: http://$PUBLIC_IP:8000"
            
            # 5. Test the actual health endpoint
            if curl --fail --silent --show-error "http://$PUBLIC_IP:8000/health"; then
              echo ""
              echo "Deployment health check passed successfully!"
              echo "PUBLIC_IP=$PUBLIC_IP" >> "$GITHUB_ENV"
              exit 0
            fi

            echo "API not responding yet. Waiting 5 seconds..."
            sleep 5
          done

          echo "Deployment health check timed out and failed."
          exit 1

      - name: Update ECS origin DNS
        env:
          HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
          ORIGIN_DNS_NAME: origin-api.albertlukmanovlabs.lol
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${PUBLIC_IP:-}" ]; then
            echo "ERROR: PUBLIC_IP was not produced by the health-check step."
            exit 1
          fi

          echo "Updating ${ORIGIN_DNS_NAME} to ${PUBLIC_IP}"

          cat > route53-change.json <<EOF
          {
            "Comment": "Update Doc Helper ECS origin task IP",
            "Changes": [
              {
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "${ORIGIN_DNS_NAME}",
                  "Type": "A",
                  "TTL": 60,
                  "ResourceRecords": [
                    {
                      "Value": "${PUBLIC_IP}"
                    }
                  ]
                }
              }
            ]
          }
          EOF

          CHANGE_ID=$(aws route53 change-resource-record-sets \
            --hosted-zone-id "${HOSTED_ZONE_ID}" \
            --change-batch file://route53-change.json \
            --query 'ChangeInfo.Id' \
            --output text)

          aws route53 wait resource-record-sets-changed \
            --id "${CHANGE_ID}"

          echo "Origin DNS updated:"
          echo "${ORIGIN_DNS_NAME} -> ${PUBLIC_IP}"
          echo "Public API URL: https://api.albertlukmanovlabs.lol/docs"