name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, test and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run linting
        run: uv run ruff check .

      - name: Run tests
        env:
          ENABLE_MOCK_LLM: "true"
          LLM_PROVIDER: "mock"
        run: uv run pytest

      - name: Build Python package
        run: uv build

  container:
    name: Build and smoke-test container
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build Docker image
        run: |
          docker build \
            --tag doc-helper-ai-agent:${{ github.sha }} \
            .

      - name: Start container
        run: |
          docker run \
            --detach \
            --name doc-helper-ai-agent \
            --publish 8000:8000 \
            doc-helper-ai-agent:${{ github.sha }}

      - name: Wait for health endpoint
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:8000/health; then
              echo
              echo "Container is healthy."
              exit 0
            fi

            echo "Waiting for application... attempt ${attempt}/30"
            sleep 2
          done

          echo "Application did not become healthy."
          docker logs doc-helper-ai-agent
          exit 1

      - name: Show container logs
        if: always()
        run: docker logs doc-helper-ai-agent || true

      - name: Remove container
        if: always()
        run: docker rm --force doc-helper-ai-agent || true