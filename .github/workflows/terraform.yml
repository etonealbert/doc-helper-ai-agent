name: Terraform Validation

on:
  pull_request:
    paths:
      - "infra/terraform/**"
  push:
    branches:
      - main
    paths:
      - "infra/terraform/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Format and validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Check formatting
        run: terraform fmt -check -recursive infra/terraform

      - name: Initialize bootstrap without backend
        working-directory: infra/terraform/bootstrap
        run: terraform init -backend=false -input=false

      - name: Validate bootstrap
        working-directory: infra/terraform/bootstrap
        run: terraform validate

      - name: Initialize dev without backend
        working-directory: infra/terraform/environments/dev
        run: terraform init -backend=false -input=false

      - name: Validate dev
        working-directory: infra/terraform/environments/dev
        run: terraform validate

  # A future apply job must run only from workflow_dispatch, authenticate with
  # GitHub OIDC, save and review a plan, and use a protected GitHub Environment
  # that requires approval. Application pushes must never apply infrastructure.
